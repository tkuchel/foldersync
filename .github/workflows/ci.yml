name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Build and test
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FolderSync.slnx

      - name: Build
        run: dotnet build FolderSync.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test FolderSync.slnx
          --no-build
          --configuration Release
          --nologo
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ${{ runner.temp }}\test-results

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: xUnit tests
          path: ${{ runner.temp }}/test-results/**/test-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: ${{ runner.temp }}/test-results/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Coverage summary
        if: always()
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Path "${{ runner.temp }}\test-results" -Recurse -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue
          if (-not $coverageFiles) {
            "No coverage file produced." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          $xml = [xml](Get-Content $coverageFiles[0].FullName)
          $lineRate = [math]::Round([double]$xml.coverage.'line-rate' * 100, 2)
          $branchRate = [math]::Round([double]$xml.coverage.'branch-rate' * 100, 2)
          "## Coverage" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Metric | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| --- | --- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Line coverage | $lineRate% |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "| Branch coverage | $branchRate% |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Publish service smoke test
        run: dotnet publish src/FolderSync/FolderSync.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-publish

      - name: Publish tray smoke test
        run: dotnet publish src/FolderSync.Tray/FolderSync.Tray.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-tray-publish
