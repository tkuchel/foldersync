name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FolderSync.slnx

      - name: Build
        run: dotnet build FolderSync.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test FolderSync.slnx --no-build --configuration Release --nologo

      - name: Validate JSON Report Shape
        run: dotnet test FolderSync.slnx --no-build --configuration Release --nologo --filter "StatusCommandTests|RuntimeHealthStoreTests|ReconciliationServiceTests|RobocopyServiceTests"

      - name: Publish Service Smoke Test
        run: dotnet publish src/FolderSync/FolderSync.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-publish

      - name: Publish Tray Smoke Test
        run: dotnet publish src/FolderSync.Tray/FolderSync.Tray.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-tray-publish
