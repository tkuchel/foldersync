name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build, validate, and smoke-test only; do not upload release assets)"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate release tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $propsPath = "Directory.Build.props"
          if (-not (Test-Path $propsPath)) {
            throw "Could not find $propsPath."
          }

          [xml]$props = Get-Content $propsPath
          $declaredVersion = $props.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($declaredVersion)) {
            throw "Directory.Build.props does not define a Version property."
          }

          $tag = "${{ github.ref_name }}"
          $expectedTag = "v$declaredVersion"

          if ($tag -ne $expectedTag) {
            throw "Release tag '$tag' does not match declared version '$declaredVersion' in Directory.Build.props. Expected tag: '$expectedTag'."
          }

      - name: Restore
        run: dotnet restore FolderSync.slnx

      - name: Build
        run: dotnet build FolderSync.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test FolderSync.slnx --no-build --configuration Release --nologo

      - name: Publish service
        run: dotnet publish src/FolderSync/FolderSync.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-service

      - name: Publish tray
        run: dotnet publish src/FolderSync.Tray/FolderSync.Tray.csproj --no-build --configuration Release -o ${{ runner.temp }}\foldersync-tray

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            [xml]$props = Get-Content "Directory.Build.props"
            $tag = "v$($props.Project.PropertyGroup.Version)-dryrun"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $serviceZip = Join-Path $env:RUNNER_TEMP "foldersync-service-$tag.zip"
          $trayZip = Join-Path $env:RUNNER_TEMP "foldersync-tray-$tag.zip"
          Compress-Archive -Path "${{ runner.temp }}\foldersync-service\*" -DestinationPath $serviceZip -Force
          Compress-Archive -Path "${{ runner.temp }}\foldersync-tray\*" -DestinationPath $trayZip -Force
          "SERVICE_ZIP=$serviceZip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TRAY_ZIP=$trayZip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release assets
        shell: pwsh
        run: |
          .\scripts\Validate-ReleaseArtifacts.ps1 -ServiceZip "${{ env.SERVICE_ZIP }}" -TrayZip "${{ env.TRAY_ZIP }}"

      - name: Smoke test packaged binaries
        shell: pwsh
        run: |
          .\scripts\Smoke-Test-ReleaseArtifacts.ps1 -ServiceZip "${{ env.SERVICE_ZIP }}" -TrayZip "${{ env.TRAY_ZIP }}"

      - name: Generate SHA256 checksums
        id: checksums
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $checksumPath = Join-Path $env:RUNNER_TEMP "foldersync-$tag-SHA256SUMS.txt"
          $serviceZip = "${{ env.SERVICE_ZIP }}"
          $trayZip = "${{ env.TRAY_ZIP }}"
          $serviceHash = (Get-FileHash -Path $serviceZip -Algorithm SHA256).Hash.ToLower()
          $trayHash = (Get-FileHash -Path $trayZip -Algorithm SHA256).Hash.ToLower()
          $lines = @(
            "$serviceHash  $(Split-Path -Leaf $serviceZip)",
            "$trayHash  $(Split-Path -Leaf $trayZip)"
          )
          $lines | Out-File -FilePath $checksumPath -Encoding ascii
          "CHECKSUMS=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Checksums:"
          Get-Content $checksumPath

      - name: Generate SBOM for service
        uses: anchore/sbom-action@v0
        with:
          path: ${{ runner.temp }}\foldersync-service
          format: cyclonedx-json
          artifact-name: foldersync-service-sbom.cdx.json
          output-file: ${{ runner.temp }}\foldersync-service-${{ steps.version.outputs.tag }}-sbom.cdx.json

      - name: Generate SBOM for tray
        uses: anchore/sbom-action@v0
        with:
          path: ${{ runner.temp }}\foldersync-tray
          format: cyclonedx-json
          artifact-name: foldersync-tray-sbom.cdx.json
          output-file: ${{ runner.temp }}\foldersync-tray-${{ steps.version.outputs.tag }}-sbom.cdx.json

      # Build-provenance attestations are not available for user-owned
      # private repositories. The step is gated so that it no-ops on
      # private repos and automatically starts attesting once the
      # repository is made public. See:
      # https://docs.github.com/rest/repos/attestations#create-an-attestation
      - name: Attest build provenance
        if: |
          startsWith(github.ref, 'refs/tags/')
          && inputs.dry_run != true
          && github.event.repository.private == false
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ env.SERVICE_ZIP }}
            ${{ env.TRAY_ZIP }}

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = $tag.TrimStart('v') -replace '-dryrun$', ''
          $changelogPath = "CHANGELOG.md"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"

          $fallback = "Release $tag.`n`nSee [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."

          if (-not (Test-Path $changelogPath)) {
            Write-Warning "CHANGELOG.md not found; using fallback notes."
            $fallback | Out-File -FilePath $notesPath -Encoding utf8
          } else {
            $content = Get-Content $changelogPath -Raw
            $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\r\n]*\r?\n(.+?)(?=^## \[|\z)"
            $match = [regex]::Match($content, $pattern)

            if ($match.Success) {
              $notes = $match.Groups[1].Value.Trim()
              $notes | Out-File -FilePath $notesPath -Encoding utf8
              Write-Host "Release notes extracted for $version"
            } else {
              Write-Warning "No CHANGELOG entry found for version $version; using fallback notes."
              $fallback | Out-File -FilePath $notesPath -Encoding utf8
            }
          }

          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release notes preview:"
          Get-Content $notesPath

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foldersync-release-${{ steps.version.outputs.tag }}
          path: |
            ${{ env.SERVICE_ZIP }}
            ${{ env.TRAY_ZIP }}
            ${{ env.CHECKSUMS }}
            ${{ runner.temp }}\foldersync-service-${{ steps.version.outputs.tag }}-sbom.cdx.json
            ${{ runner.temp }}\foldersync-tray-${{ steps.version.outputs.tag }}-sbom.cdx.json

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') && inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_path }}
          append_body: true
          generate_release_notes: true
          files: |
            ${{ env.SERVICE_ZIP }}
            ${{ env.TRAY_ZIP }}
            ${{ env.CHECKSUMS }}
            ${{ runner.temp }}\foldersync-service-${{ steps.version.outputs.tag }}-sbom.cdx.json
            ${{ runner.temp }}\foldersync-tray-${{ steps.version.outputs.tag }}-sbom.cdx.json
