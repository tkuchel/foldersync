name: Feature Request
description: Suggest an enhancement or new capability for FolderSync.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the operator problem
        first, then the proposed solution. That makes it easier to evaluate
        alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the operator scenario or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would FolderSync do differently? Commands, config, dashboard, tray, notifications, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they were not sufficient.

  - type: textarea
    id: impact
    attributes:
      label: Safety and compatibility impact
      description: Would this affect deletion behavior, config shape, persisted state files, or on-disk layout?

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues for similar requests.
          required: true
        - label: This is not a security report. (If it is, I will follow SECURITY.md instead.)
          required: true
