version: 2

updates:
  # NuGet dependencies for the solution (src/ and tests/).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      serilog:
        patterns:
          - "Serilog*"
      test-dependencies:
        patterns:
          - "xunit*"
          - "NSubstitute*"
          - "coverlet*"
          - "Microsoft.NET.Test.Sdk"
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
